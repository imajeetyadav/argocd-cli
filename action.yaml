name: ArgoCD CLI
description: GitHub Action to install the ArgoCD CLI with multi-arch support
author: Ajeet Yadav <ajeet@codingprotocols.com>
branding:
  icon: 'terminal'
  color: 'blue'
inputs:
  version:
    description: Version of the ArgoCD CLI to use
    required: false
    default: latest
runs:
  using: composite
  steps:
  - name: Configure ArgoCD CLI
    run: ${{ github.action_path }}/setup.sh
    shell: bash
    env:
      VERSION: ${{ inputs.version }}
